kind: pipeline
type: docker
name: pms-releaser-test

trigger:
  event:
    - tag

steps:
- name: release-test-apk
  image: hao88/pms-releaser:latest
  environment:
    ACCESS_TOKEN:
      from_secret: ACCESS_TOKEN
    RELEASE_URL:
      from_secret: RELEASE_URL
  commands:
  - pms-releaser /drone/src/test.apk ${DRONE_TAG} my-project my-package test-apk android universal