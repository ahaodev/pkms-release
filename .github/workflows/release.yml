name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish release
        uses: ahaodev/pkms-release@main
        with:
          file_path: './Dockerfile'
          version: ${{ github.ref_name }} # tag name, e.g. v1.0.0
          project_name: ${{ vars.PROJECT_NAME }}   # set in repo/org variables
          package_name: ${{ vars.PACKAGE_NAME }}   # set in repo/org variables
          artifact_name: 'MyApp'
          os: 'android'
          arch: 'universal'
          access_token: ${{ secrets.ACCESS_TOKEN }}
          release_url: ${{ secrets.RELEASE_URL }}
