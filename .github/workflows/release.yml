name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Create a dummy artifact for testing (replace with your real build step)
      - name: Create test artifact
        run: echo "test-artifact" > ./app.apk

      - name: Publish release
        uses: ahaodev/pkms-release@main
        with:
          file_path: './app.apk'
          version: ${{ github.ref_name }} # tag name, e.g. v1.0.0
          artifact_name: 'MyApp'
          os: 'android'
          arch: 'universal'
          access_token: ${{ secrets.ACCESS_TOKEN }}
          release_url: ${{ secrets.RELEASE_URL }}
